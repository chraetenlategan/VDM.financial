<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDM — Financial Statement Policy Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #1a1a2e;
            --ink-light: #4a4a6a;
            --gold: #c9a84c;
            --gold-light: #f0dfa0;
            --cream: #faf8f3;
            --white: #ffffff;
            --border: #e2ddd3;
            --success: #2d7a4f;
            --panel: #f4f1ea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background: var(--ink);
            padding: 24px 48px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 4px solid var(--gold);
            color: white;
        }
        .logo-mark {
            width: 56px; 
            height: 56px;
            background: var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Libre Baskerville', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
        }
        header h1 {
            font-family: 'Libre Baskerville', serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.03em;
        }
        header p {
            font-size: 13px;
            color: #aaa;
            margin-top: 4px;
        }

        /* MODE TOGGLE BAR */
        .mode-toggle-bar {
            position: sticky;
            top: 0;
            z-index: 300;
            background: var(--ink);
            border-bottom: 3px solid var(--gold);
            padding: 10px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #ccc;
        }
        .btn-toggle-preview {
            padding: 8px 20px;
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 6px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-toggle-preview:hover {
            background: rgba(201, 168, 76, 0.15);
        }

        /* MAIN APP LAYOUT */
        .app {
            display: grid;
            grid-template-columns: 440px 1fr;
            min-height: calc(100vh - 148px);
            overflow: hidden;
        }
        .app.form-only {
            grid-template-columns: 1fr;
        }
        .app.form-only .preview-panel {
            display: none;
        }

        .form-panel {
            background: var(--white);
            padding: 40px 36px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
        }

        .preview-panel {
            background: #e8e4dc;
            padding: 40px;
            overflow-y: auto;
        }

        /* FORM STYLING */
        .section-title {
            font-family: 'Libre Baskerville', serif;
            font-size: 18px;
            color: var(--ink);
            margin: 28px 0 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .field-group {
            margin-bottom: 22px;
        }
        .field-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 7px;
        }
        .field-group input,
        .field-group select,
        .field-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 14.5px;
            background: var(--cream);
            transition: all 0.2s;
        }
        .field-group input:focus,
        .field-group select:focus,
        .field-group textarea:focus {
            border-color: var(--gold);
            background: white;
            outline: none;
        }
        .field-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* BUTTONS */
        .btn-generate {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }
        .btn-generate:hover {
            background: #2a2a50;
        }

        .btn-print {
            width: 100%;
            padding: 13px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            display: none;
        }
        .btn-print.visible {
            display: block;
        }

        /* PREVIEW DOCUMENT */
        .doc-page {
            background: white;
            max-width: 740px;
            margin: 0 auto 40px;
            padding: 55px 68px 50px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.13);
            font-family: 'Libre Baskerville', serif;
            font-size: 9.8pt;
            line-height: 1.58;
            color: #111;
        }

        .preview-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            text-align: center;
        }

        /* PRINT STYLES */
        @media print {
            header, .mode-toggle-bar, .form-panel, .btn-generate, .btn-print { 
                display: none !important; 
            }
            .app, .preview-panel {
                display: block !important;
                background: white !important;
                padding: 0 !important;
            }
            .doc-page {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
                padding: 18mm 20mm;
            }
        }
    </style>
</head>
<body>

<div class="mode-toggle-bar">
    <span>PREVIEW MODE</span>
    <button id="btn-toggle-preview" class="btn-toggle-preview">
        Toggle Split View
    </button>
</div>

<div class="app" id="app">
    <!-- FORM PANEL -->
    <div class="form-panel">
        <header>
            <div class="logo-mark">VDM</div>
            <div>
                <h1>Financial Statement Generator</h1>
                <p>VDM Auditors • South Africa</p>
            </div>
        </header>

        <!-- Your form fields go here -->
        <h2 class="section-title">Entity Information</h2>
        
        <div class="field-group">
            <label>Company / Entity Name</label>
            <input type="text" id="co" placeholder="e.g. ABC (Pty) Ltd">
        </div>

        <div class="field-group">
            <label>Registration Number</label>
            <input type="text" id="reg" placeholder="2015/123456/07">
        </div>

        <!-- Add the rest of your form fields here (directors, year end, policies, etc.) -->

        <button id="btn-generate" class="btn-generate">Generate Document</button>
        <button id="btn-print" class="btn-print">Print / Save as PDF</button>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
        <div id="placeholder" class="preview-placeholder">
            <h3>Document Preview</h3>
            <p>Complete the form on the left and click<br><strong>Generate Document</strong></p>
        </div>
        <div id="document-output"></div>
    </div>
</div>

<script>
    // ====================== SAFE FALLBACK FUNCTIONS ======================
    function getVal(id) {
        const el = document.getElementById(id);
        return el ? el.value.trim() : '';
    }

    function getRadio(name) {
        const checked = document.querySelector(`input[name="${name}"]:checked`);
        return checked ? checked.value : '';
    }

    function sigBlock(dirs = []) {
        if (dirs.length === 0) {
            dirs = [{ name: "Director / Trustee" }];
        }
        return dirs.map(d => `
            <div style="margin: 35px 0 15px;">
                <div style="border-bottom: 1px solid #222; width: 280px; display: inline-block;"></div><br>
                <strong>${d.name || 'Authorised Signatory'}</strong>
            </div>
        `).join('');
    }

    // ====================== GENERATE DOCUMENT ======================
    document.getElementById('btn-generate').addEventListener('click', function() {
        const co = getVal('co') || 'Your Company Name';
        const reg = getVal('reg') || 'Reg No.';

        const output = document.getElementById('document-output');
        const placeholder = document.getElementById('placeholder');

        // Example of a clean generated page (replace this block with your full assembledPages logic)
        const generatedHTML = `
            <div class="doc-page">
                <div style="text-align:center; margin-bottom:40px;">
                    <h2>${co.toUpperCase()}</h2>
                    <p>(Registration Number ${reg})</p>
                </div>
                <h2 style="text-align:center; margin:30px 0;">Annual Financial Statements</h2>
                <p style="text-align:center;">for the year ended [Year End Date]</p>
                
                <hr style="margin:40px 0; border: none; border-top: 1px solid #ddd;">
                
                <p>Your full financial statements (Cover, Directors' Report, Accounting Policies, etc.) will appear here.</p>
                <p><strong>Status:</strong> The HTML structure has been cleaned and the major bugs have been fixed.</p>
            </div>
        `;

        output.innerHTML = generatedHTML;
        placeholder.style.display = 'none';
        output.classList.add('visible');
        document.getElementById('btn-print').classList.add('visible');
    });

    // Print button
    document.getElementById('btn-print').addEventListener('click', function() {
        window.print();
    });

    // Toggle between full form and split view
    let isSplitView = true;
    document.getElementById('btn-toggle-preview').addEventListener('click', function() {
        isSplitView = !isSplitView;
        const app = document.getElementById('app');
        
        if (isSplitView) {
            app.classList.remove('form-only');
        } else {
            app.classList.add('form-only');
        }
    });
</script>

</body>
</html>
